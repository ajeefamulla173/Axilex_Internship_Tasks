<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff0e6; text-align: center; margin:0; }
        .form-container { background: white; width: 350px; margin: 50px auto; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #6a5acd; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #4b0082; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Edit Student</h2>
        <form method="POST" action="/update/{{ student.id }}">
            <input type="text" name="name" value="{{ student.name }}" required><br>
            <input type="email" name="email" value="{{ student.email }}" required><br>
            <button type="submit">Update</button>
        </form>
        <p><a href="/dashboard">Back to Dashboard</a></p>
    </div>
</body>
</html>
